# =============================================================================
# GitHub Actions - Build and Publish Docker Image
# =============================================================================
# Repository: carlosna/hexagonal
#
# This workflow:
# 1. Runs Maven tests.
# 2. Builds and publishes the Docker image.
# 3. Opens a PR in the GitOps/Helm repository with the new image tag.
#
# Required secrets:
#   DOCKERHUB_USERNAME  -> Docker Hub username
#   DOCKERHUB_TOKEN     -> Docker Hub access token
#   GH_PAT              -> GitHub PAT with write access to the GitOps repo
# =============================================================================

name: Build and Publish Image

on:
  push:
    branches:
      - main
    paths:
      - "boletojuros/**"
      - "boletojuros/Dockerfile"
      - ".github/workflows/build-and-publish-image.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "boletojuros/**"
      - "boletojuros/Dockerfile"
      - ".github/workflows/build-and-publish-image.yaml"

env:
  DOCKER_IMAGE: carlosna/boletojuros
  JAVA_VERSION: "21"
  GITOPS_REPO: carlosna/k8s-canary-lab-chart
  GITOPS_VALUES_FILE: environments/dev/values.yaml

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          cache-dependency-path: boletojuros/pom.xml

      - name: Make Maven wrapper executable
        working-directory: boletojuros
        run: chmod +x mvnw

      - name: Run tests
        working-directory: boletojuros
        run: ./mvnw verify -B

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Define image variables
        id: vars
        run: |
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          IMAGE_TAG="sha-${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Short SHA: ${SHORT_SHA}"
          echo "Image tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./boletojuros
          file: ./boletojuros/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "## Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.DOCKER_IMAGE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${{ steps.vars.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: gitops-repo

      - name: Install yq
        working-directory: gitops-repo
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag in environment values
        working-directory: gitops-repo
        run: |
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          VALUES_FILE="${{ env.GITOPS_VALUES_FILE }}"
          export NEW_TAG
          export DOCKER_IMAGE="${{ env.DOCKER_IMAGE }}"

          echo "Updating ${VALUES_FILE}"
          yq -i '.app.image.repository = strenv(DOCKER_IMAGE)' "${VALUES_FILE}"
          yq -i '.app.image.tag = strenv(NEW_TAG)' "${VALUES_FILE}"

          echo "--- Diff ---"
          git diff "${VALUES_FILE}"

      - name: Create branch and pull request
        working-directory: gitops-repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          VALUES_FILE="${{ env.GITOPS_VALUES_FILE }}"
          BRANCH_NAME="deploy/${NEW_TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${VALUES_FILE}"; then
            echo "No GitOps changes detected."
            exit 0
          fi

          git checkout -b "${BRANCH_NAME}"
          git add "${VALUES_FILE}"
          git commit -m "chore: deploy image ${NEW_TAG}"
          git push origin "${BRANCH_NAME}"

          gh pr create \
            --title "Deploy image ${NEW_TAG}" \
            --body "Updates \`${VALUES_FILE}\` to deploy \`${{ env.DOCKER_IMAGE }}:${NEW_TAG}\`.

          Source commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --head "${BRANCH_NAME}" \
            --base main
